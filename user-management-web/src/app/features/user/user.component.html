<div style="margin: 20px; gap:20px;">
  <button (click)="goToUpdateUser()">Create User</button>
  <br/>

  <table>
    <thead>
      <tr style="background-color: #f0f0f0;">
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td><button (click)="deleteUser(user.id)" style="cursor: pointer;">
          🗑️ Delete
        </button></td>
      </tr>

      <tr *ngIf="users.length === 0">
        <td colspan="3" style="text-align: center; padding: 10px;">
          No data available
        </td>
      </tr>
    </tbody>
  </table>
</div>
